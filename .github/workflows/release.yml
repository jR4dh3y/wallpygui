name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  AUR_PKGNAME: wallpygui

jobs:
  deploy-aur:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Compute source checksum
        id: checksum
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          source_url="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/v${VERSION}.tar.gz"
          sha256=$(curl -fsSL "${source_url}" | sha256sum | awk '{print $1}')
          echo "sha256=${sha256}" >> "${GITHUB_OUTPUT}"

      - name: Update AUR packaging files
        env:
          VERSION: ${{ steps.version.outputs.version }}
          CHECKSUM: ${{ steps.checksum.outputs.sha256 }}
        run: |
          pkgdir="packaging/aur/${AUR_PKGNAME}"

          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" "${pkgdir}/PKGBUILD"
          sed -i "s/^sha256sums=.*/sha256sums=('${CHECKSUM}')/" "${pkgdir}/PKGBUILD"

          sed -i "s/^\([[:space:]]*pkgver = \).*/\1${VERSION}/" "${pkgdir}/.SRCINFO"
          sed -i "s/^\([[:space:]]*sha256sums = \).*/\1${CHECKSUM}/" "${pkgdir}/.SRCINFO"
          sed -i "s/${AUR_PKGNAME}-[0-9]\+\.[0-9]\+\.[0-9]\+\.tar\.gz/${AUR_PKGNAME}-${VERSION}.tar.gz/g" "${pkgdir}/.SRCINFO"
          sed -i "s|/v[0-9]\+\.[0-9]\+\.[0-9]\+\.tar\.gz|/v${VERSION}.tar.gz|g" "${pkgdir}/.SRCINFO"

      - name: Configure AUR SSH key
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p "${HOME}/.ssh"
          printf '%s\n' "${AUR_SSH_PRIVATE_KEY}" > "${HOME}/.ssh/aur"
          chmod 600 "${HOME}/.ssh/aur"
          ssh-keyscan -t rsa,ecdsa,ed25519 aur.archlinux.org >> "${HOME}/.ssh/known_hosts"

      - name: Deploy to AUR
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GIT_SSH_COMMAND: ssh -i ~/.ssh/aur -o IdentitiesOnly=yes
        run: |
          aur_remote="ssh://aur@aur.archlinux.org/${AUR_PKGNAME}.git"

          if ! git clone "${aur_remote}" aur-package; then
            mkdir aur-package
            git -C aur-package init
            git -C aur-package remote add origin "${aur_remote}"
          fi

          cp "packaging/aur/${AUR_PKGNAME}/PKGBUILD" aur-package/PKGBUILD
          cp "packaging/aur/${AUR_PKGNAME}/.SRCINFO" aur-package/.SRCINFO

          cd aur-package
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git add PKGBUILD .SRCINFO

          if git diff --cached --quiet; then
            echo "AUR package is already up to date."
            exit 0
          fi

          git commit -m "Update to v${VERSION}"
          git push origin HEAD:master
